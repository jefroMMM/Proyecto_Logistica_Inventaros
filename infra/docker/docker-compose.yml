services:
  db:
    image: postgres:15
    container_name: controltower-postgres
    restart: always
    environment:
      POSTGRES_DB: controltower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
    ports:
      - "5432:5432"
    volumes:
      - controltower_data:/var/lib/postgresql/data

volumes:
  controltower_data: